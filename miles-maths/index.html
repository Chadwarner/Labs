
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F0EB;
  --surface: #EEEAE4;
  --border: #D9D3CA;
  --text-primary: #1A1714;
  --text-secondary: #6B6560;
  --accent: #C96442;
  --accent-hover: #A8472A;
  --white: #FAF7F4;
}

body { background: var(--bg); font-family: Inter, system-ui, sans-serif; }

.app { padding: 18px 16px; max-width: 420px; margin: 0 auto; background: var(--bg); min-height: 100vh; }

.header { margin-bottom: 20px; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.title { font-family: Georgia, 'Playfair Display', serif; font-size: 18px; font-weight: normal; color: var(--text-primary); }
.counter { font-size: 13px; color: var(--text-secondary); font-family: Inter, system-ui, sans-serif; background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px; padding: 3px 10px; }
.progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.35s ease; }

.category-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 6px; margin-bottom: 14px; letter-spacing: 0.05em; text-transform: uppercase; background: var(--surface); color: var(--accent); border: 0.5px solid var(--border); font-family: Inter, system-ui, sans-serif; }

.card { background: var(--white); border: 0.5px solid var(--border); border-radius: 12px; padding: 28px 22px 22px; min-height: 260px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.08); transition: box-shadow 0.15s; }
.card:active { box-shadow: 0 1px 2px rgba(0,0,0,0.06); }

.card-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); margin-bottom: 14px; font-family: Inter, system-ui, sans-serif; }

.question-text { font-family: Georgia, 'Playfair Display', serif; font-size: 20px; font-weight: normal; color: var(--text-primary); line-height: 1.6; flex: 1; }

.tap-hint { font-size: 13px; color: var(--text-secondary); text-align: center; margin-top: 22px; font-family: Inter, system-ui, sans-serif; }

.answer-section { margin-top: 20px; padding-top: 18px; border-top: 0.5px solid var(--border); }
.answer-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 10px; font-family: Inter, system-ui, sans-serif; }
.answer-text { font-family: Georgia, 'Playfair Display', serif; font-size: 20px; color: var(--text-primary); line-height: 1.55; font-weight: normal; }

.concept-box { margin-top: 14px; background: var(--surface); border-radius: 8px; padding: 12px 14px; border-left: 2px solid var(--accent); }
.concept-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 5px; font-family: Inter, system-ui, sans-serif; }
.concept-text { font-size: 14px; color: var(--text-secondary); line-height: 1.6; font-family: Inter, system-ui, sans-serif; }

.nav { display: flex; gap: 10px; margin-top: 14px; }

.btn { flex: 1; padding: 13px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--white); font-size: 15px; font-weight: 500; color: var(--text-primary); cursor: pointer; font-family: Inter, system-ui, sans-serif; transition: background 0.1s; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.btn:active { background: var(--surface); transform: scale(0.98); }

.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 1px 4px rgba(201,100,66,0.25); }
.btn-primary:active { background: var(--accent-hover); border-color: var(--accent-hover); }

.done-screen { text-align: center; padding: 48px 20px; }
.done-icon { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 24px; background: var(--surface); border: 0.5px solid var(--border); color: var(--accent); }
.done-title { font-family: Georgia, 'Playfair Display', serif; font-size: 24px; font-weight: normal; margin-bottom: 10px; color: var(--text-primary); }
.done-sub { font-size: 15px; color: var(--text-secondary); margin-bottom: 28px; line-height: 1.7; font-family: Inter, system-ui, sans-serif; }

.hidden { display: none; }
</style>

<div class="app">
  <div class="header">
    <div class="header-top">
      <span class="title">GCSE Maths Revision</span>
      <span class="counter" id="counter">1 / 40</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:2.5%"></div></div>
  </div>

  <div id="card-view">
    <div class="category-badge" id="category-badge">Algebra</div>

    <div class="card" id="card" onclick="toggleAnswer()">
      <div>
        <div class="card-label">Question</div>
        <div class="question-text" id="question-text"></div>
      </div>
      <div class="answer-section hidden" id="answer-section">
        <div class="answer-label">Answer</div>
        <div class="answer-text" id="answer-text"></div>
        <div class="concept-box hidden" id="concept-box">
          <div class="concept-label">Key concept</div>
          <div class="concept-text" id="concept-text"></div>
        </div>
      </div>
      <div class="tap-hint" id="tap-hint">tap to reveal answer</div>
    </div>

    <div class="nav">
      <button class="btn" onclick="prev()">Back</button>
      <button class="btn btn-primary" id="next-btn" onclick="next()">Next</button>
    </div>
  </div>

  <div id="done-view" class="done-screen hidden">
    <div class="done-icon">✓</div>
    <div class="done-title">All done, Miles.</div>
    <div class="done-sub">40 cards covered.<br>Get some sleep — you've got this tomorrow.</div>
    <button class="btn btn-primary" style="width:100%;padding:14px;" onclick="restart()">Go again</button>
  </div>
</div>

<script>
const cards = [
  { cat: "Algebra", q: "Simplify fully: (3x² − 17x + 10) ÷ (x² − 7x + 10)", a: "(3x − 2) / (x − 2)", concept: "Factorise both top and bottom, then cancel common factors. Top: (3x−2)(x−5). Bottom: (x−2)(x−5)." },
  { cat: "Algebra", q: "Make w the subject of: y = 3w − 10", a: "w = (y + 10) / 3", concept: "Add 10 to both sides, then divide by 3. Keep the fraction — don't round." },
  { cat: "Algebra", q: "Solve: x² − 2x − 15 = 0", a: "x = 5 or x = −3", concept: "Factorise to (x−5)(x+3) = 0. Find two numbers that multiply to −15 and add to −2." },
  { cat: "Algebra", q: "Expand and simplify: (1 + √2)(3 − √2)", a: "1 + 2√2", concept: "FOIL: 3 − √2 + 3√2 − 2 = 1 + 2√2. Remember √2 × √2 = 2." },
  { cat: "Algebra", q: "Solve the inequality: 2x² − 7x − 4 < 0", a: "−½ < x < 4", concept: "Factorise: (2x+1)(x−4) < 0. Sketch the parabola — between the roots is where it's negative." },
  { cat: "Algebra", q: "Write x² + 10x + 5 in the form (x + a)² + b", a: "(x + 5)² − 20", concept: "Completing the square: halve the x coefficient (→5), square it (→25), then adjust: 5 − 25 = −20." },
  { cat: "Algebra", q: "f(x) = 2x + 1, g(x) = x² + 3. Find fg(x).", a: "2x² + 7", concept: "fg means f applied to g(x): f(x²+3) = 2(x²+3)+1 = 2x²+7. Always do the inner function first." },
  { cat: "Algebra", q: "Simplify fully: (2x² + 9x − 5) / (6x² − 5x + 1)", a: "(x + 5) / (3x − 1)", concept: "Factorise: top = (2x−1)(x+5), bottom = (2x−1)(3x−1). Cancel (2x−1)." },
  { cat: "Algebra", q: "g(x) = 5x + 3. Find g⁻¹(x).", a: "g⁻¹(x) = (x − 3) / 5", concept: "Write y = 5x+3, rearrange for x: x = (y−3)/5, then swap x and y to get the inverse." },
  { cat: "Algebra", q: "Prove: the sum of squares of any 2 consecutive integers is always odd.", a: "n² + (n+1)² = 2n²+2n+1 = 2n(n+1)+1 — always odd", concept: "Use n and n+1. Expand, collect terms, show result is 2(something)+1. That structure is always odd." },
  { cat: "Surds & Indices", q: "Write 7√50 in the form k√2.", a: "k = 35", concept: "√50 = √(25×2) = 5√2. So 7√50 = 7×5√2 = 35√2." },
  { cat: "Surds & Indices", q: "Rationalise the denominator: 6/√2", a: "3√2", concept: "Multiply top and bottom by √2: 6√2/2 = 3√2. Always multiply by the surd in the denominator." },
  { cat: "Surds & Indices", q: "Write down the value of 9^(½)", a: "3", concept: "A power of ½ means square root. √9 = 3." },
  { cat: "Surds & Indices", q: "Write down the value of 8^(−⅓)", a: "½", concept: "Power of ⅓ means cube root: ∛8 = 2. Negative power means reciprocal: 1/2." },
  { cat: "Surds & Indices", q: "Write (4 + √5)² in the form a + b√5.", a: "21 + 8√5", concept: "Expand: 16 + 4√5 + 4√5 + 5 = 21 + 8√5. Remember √5 × √5 = 5." },
  { cat: "Proportionality", q: "y is inversely proportional to x. When y = 5, x = 0.5. Find y when x = 0.25.", a: "y = 10", concept: "Inverse proportion: y = k/x. Find k = 5×0.5 = 2.5. Then y = 2.5/0.25 = 10." },
  { cat: "Proportionality", q: "y is inversely proportional to x³. When y = 0.5, x = 2. Find y when x = 4.", a: "y = 0.0625", concept: "y = k/x³. Find k: 0.5 = k/8, so k = 4. Then y = 4/64 = 0.0625." },
  { cat: "Proportionality", q: "g is directly proportional to √h. When g = 4, h = 36. Find h when g = 2.", a: "h = 9", concept: "g = k√h. Find k: 4 = k×6, so k = ⅔. Then 2 = ⅔√h → √h = 3 → h = 9." },
  { cat: "Functions", q: "f(x) = 3x+1, g(x) = x²−5. Find fg(3).", a: "13", concept: "First find g(3) = 9−5 = 4. Then f(4) = 12+1 = 13. Always work the inner function first." },
  { cat: "Functions", q: "Turning point of y=f(x) is (1,4). Turning point of y=f(x+3)?", a: "(−2, 4)", concept: "f(x+3) shifts the graph LEFT by 3. Subtract 3 from the x-coordinate only." },
  { cat: "Functions", q: "Turning point of y=f(x) is (2,−5). Turning point of y=f(x)+2?", a: "(2, −3)", concept: "Adding 2 outside shifts the graph UP by 2. Only the y-coordinate changes." },
  { cat: "Functions", q: "Turning point of y=f(x) is (−4,2). Turning point of y=−f(x)?", a: "(−4, −2)", concept: "−f(x) reflects in the x-axis. The y-coordinate changes sign; x stays the same." },
  { cat: "Iteration", q: "Using xₙ₊₁ = 4/(xₙ²+2) with x₀=1, find x₁, x₂, x₃.", a: "x₁ ≈ 1.333, x₂ ≈ 1.097, x₃ ≈ 1.222", concept: "Substitute each answer back in. The sequence converges to the root of x³ + 2x = 4." },
  { cat: "Circle Geometry", q: "AB is a diameter, C is on the circle. What is angle ACB?", a: "90°", concept: "Angle in a semicircle = 90°. Fundamental circle theorem — always flag when AB is a diameter." },
  { cat: "Circle Geometry", q: "A circle has equation x² + y² = 7. State the centre and exact radius.", a: "Centre (0,0), radius = √7", concept: "x² + y² = r² means centre is the origin. Radius = √(constant). Leave as √7 — don't estimate." },
  { cat: "Circle Geometry", q: "P = (2,1) is on x² + y² = 5. Find the equation of the tangent at P.", a: "y = −2x + 5", concept: "Radius to P has gradient 1/2. Tangent is perpendicular: gradient = −2. Use y−1 = −2(x−2)." },
  { cat: "Vectors", q: "OB = b, OC = c, OC = ⅓OA, BD = ¼BA. Find CD in terms of b and c.", a: "(3b − c) / 4", concept: "Build a path: CD = CO + OB + BD. Express each step using the given ratios, then collect b and c." },
  { cat: "Probability", q: "Bag: 6 red, 4 blue counters. Two taken without replacement. P(one of each colour)?", a: "8/15", concept: "P(R then B) + P(B then R) = (6/10 × 4/9) + (4/10 × 6/9) = 48/90 = 8/15." },
  { cat: "Probability", q: "P(A)=0.4, P(B)=0.2, P(A∩B)=0.06. Are A and B independent?", a: "No — P(A)×P(B) = 0.08 ≠ 0.06", concept: "Independent means P(A∩B) = P(A)×P(B). Check: 0.4×0.2 = 0.08 ≠ 0.06, so not independent." },
  { cat: "Proof", q: "Prove that (2n+3)² − (2n−3)² is always a multiple of 12.", a: "= 24n = 12(2n), a multiple of 12 for all integer n", concept: "Expand both squares, subtract. You get 24n. Always factorise the result to show divisibility clearly." },
  { cat: "Sequences", q: "Find the nth term of: 5, 3, −1, −7, −15...", a: "−n² + n + 5", concept: "Second differences = −2, so coefficient of n² is −1. Subtract −n² from each term to find the linear part." },
  { cat: "Sequences", q: "Find the nth term of: 2, 9, 18, 29, 42...", a: "2n² − n + 1", concept: "Second differences = 4, so coefficient of n² is 2. Subtract 2n² from each term, then find the linear rule." },
  { cat: "Similar Shapes", q: "Similar cylinders: surface areas 50cm² and 128cm². Height of A = 7cm. Find height of B.", a: "11.2 cm", concept: "Area SF = 128/50 = 2.56. Length SF = √2.56 = 1.6. Height B = 7 × 1.6 = 11.2cm." },
  { cat: "Standard Form", q: "Work out: (2.3 × 10¹²) ÷ (4.6 × 10³). Give in standard form.", a: "5 × 10⁸", concept: "Divide numbers: 2.3÷4.6 = 0.5. Subtract powers: 10⁹. So 0.5×10⁹ = 5×10⁸." },
  { cat: "Trigonometry", q: "Triangle: AB=5.8cm, BC=4.2cm, AC=7.2cm. Find angle BAC to 3 s.f.", a: "35.4°", concept: "Use the cosine rule: cos(A) = (b²+c²−a²)/(2bc). Then use cos⁻¹ to find the angle." },
  { cat: "Trigonometry", q: "Two sides 9cm and 11cm with included angle 105°. Find the third side to 1dp.", a: "≈ 15.7 cm", concept: "Cosine rule: c² = a²+b²−2ab·cos(C). Sub in: 81+121−2×9×11×cos(105°)." },
  { cat: "Graphs", q: "Where is the turning point of y = x² − 4x + 5?", a: "Turning point at (2, 1)", concept: "Complete the square: (x−2)²+1. Minimum at (2,1). Positive x² = U-shaped parabola." },
  { cat: "Graphs", q: "Sketch y = tan x° for 0 ≤ x ≤ 360. Where are the asymptotes?", a: "Asymptotes at x = 90° and x = 270°", concept: "tan is undefined when cos = 0. Repeats every 180°, passing through (0,0) and (180,0)." },
  { cat: "Bounds", q: "f = √g / h. g=22 (2 s.f.), h=9.2 (1 d.p.). Upper bound of f to 2 d.p.?", a: "≈ 0.52", concept: "Upper bound: maximise numerator, minimise denominator. g upper = 22.5, h lower = 9.15." },
  { cat: "Algebraic Fractions", q: "Solve: 2/(x+3) + 9/(x+7) = 1", a: "x = −1 or x = −13", concept: "Multiply through by (x+3)(x+7) to clear fractions. Expand, rearrange to a quadratic, then factorise." }
];

let current = 0;
let shown = false;

function render() {
  const c = cards[current];
  document.getElementById('category-badge').textContent = c.cat;
  document.getElementById('question-text').textContent = c.q;
  document.getElementById('answer-text').textContent = c.a;
  document.getElementById('counter').textContent = (current+1) + ' / ' + cards.length;
  document.getElementById('progress').style.width = ((current+1)/cards.length*100) + '%';
  if (c.concept) {
    document.getElementById('concept-text').textContent = c.concept;
    document.getElementById('concept-box').classList.remove('hidden');
  } else {
    document.getElementById('concept-box').classList.add('hidden');
  }
  document.getElementById('answer-section').classList.add('hidden');
  document.getElementById('tap-hint').classList.remove('hidden');
  document.getElementById('next-btn').textContent = 'Next';
  shown = false;
}

function toggleAnswer() {
  if (!shown) {
    document.getElementById('answer-section').classList.remove('hidden');
    document.getElementById('tap-hint').classList.add('hidden');
    document.getElementById('next-btn').textContent = 'Got it  →';
    shown = true;
  }
}

function next() {
  if (current < cards.length - 1) { current++; render(); }
  else {
    document.getElementById('card-view').classList.add('hidden');
    document.getElementById('done-view').classList.remove('hidden');
  }
}

function prev() {
  if (current > 0) { current--; render(); }
}

function restart() {
  current = 0;
  document.getElementById('done-view').classList.add('hidden');
  document.getElementById('card-view').classList.remove('hidden');
  render();
}

render();
</script>
