<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Poo Tracker</title>
<style>
  :root {
    --bg: #F5F0EB;
    --bg-alt: #FAF7F4;
    --surface: #EEEAE4;
    --border: #D9D3CA;
    --text: #1A1714;
    --text-muted: #6B6560;
    --accent: #C96442;
    --accent-hover: #A8472A;
    --button-text: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    line-height: 1.6;
  }

  .app {
    width: 100%;
    max-width: 720px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 700;
    font-size: 36px;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 14px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; }
    h1 { font-size: 28px; }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 22px;
    font-weight: 700;
  }

  .label {
    font-size: 13px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .timer {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 30px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .last {
    font-size: 14px;
    color: var(--text-muted);
  }

  .actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  button {
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 9px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--button-text);
    border: 1px solid var(--accent);
  }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  footer {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: var(--text-muted);
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Poo Tracker</h1>
      <div class="subtitle">Time since last deposit</div>
    </header>

    <div class="grid">
      <div class="card" id="card-chad">
        <div>
          <div class="label">Tracking</div>
          <div class="name">Chad</div>
        </div>
        <div>
          <div class="label">Time since last poo</div>
          <div class="timer" id="timer-chad">—</div>
        </div>
        <div class="last" id="last-chad">—</div>
        <div class="actions">
          <button class="btn-primary" data-who="chad" data-action="now">Just pooed</button>
          <button class="btn-ghost" data-who="chad" data-action="reset">Reset</button>
        </div>
      </div>

      <div class="card" id="card-rob">
        <div>
          <div class="label">Tracking</div>
          <div class="name">Rob</div>
        </div>
        <div>
          <div class="label">Time since last poo</div>
          <div class="timer" id="timer-rob">—</div>
        </div>
        <div class="last" id="last-rob">—</div>
        <div class="actions">
          <button class="btn-primary" data-who="rob" data-action="now">Just pooed</button>
          <button class="btn-ghost" data-who="rob" data-action="reset">Reset</button>
        </div>
      </div>
    </div>

    <footer>Saves automatically · ticks every second</footer>
  </div>

<script>
  const DEFAULTS = {
    chad: new Date('2026-04-28T06:56:00').getTime(),
    rob:  new Date('2026-04-28T07:09:00').getTime()
  };

  const state = { chad: DEFAULTS.chad, rob: DEFAULTS.rob };

  const fmtLast = (ts) => {
    const d = new Date(ts);
    return 'Last: ' + d.toLocaleString(undefined, {
      weekday: 'short', day: 'numeric', month: 'short',
      hour: '2-digit', minute: '2-digit'
    });
  };

  const fmtElapsed = (ms) => {
    if (ms < 0) ms = 0;
    const totalSec = Math.floor(ms / 1000);
    const d = Math.floor(totalSec / 86400);
    const h = Math.floor((totalSec % 86400) / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    const pad = (n) => String(n).padStart(2, '0');
    if (d > 0) return `${d}d ${pad(h)}:${pad(m)}:${pad(s)}`;
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
  };

  const render = () => {
    const now = Date.now();
    ['chad', 'rob'].forEach(who => {
      document.getElementById(`timer-${who}`).textContent = fmtElapsed(now - state[who]);
      document.getElementById(`last-${who}`).textContent = fmtLast(state[who]);
    });
  };

  const save = async (who) => {
    try {
      await window.storage.set(`poo:${who}`, String(state[who]));
    } catch (e) { /* storage may be unavailable; in-memory still works */ }
  };

  const load = async () => {
    for (const who of ['chad', 'rob']) {
      try {
        const r = await window.storage.get(`poo:${who}`);
        if (r && r.value) {
          const n = Number(r.value);
          if (!Number.isNaN(n)) state[who] = n;
        }
      } catch (e) { /* fall through to default */ }
    }
    render();
  };

  document.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-who]');
    if (!btn) return;
    const who = btn.dataset.who;
    const action = btn.dataset.action;
    if (action === 'now') state[who] = Date.now();
    if (action === 'reset') state[who] = DEFAULTS[who];
    save(who);
    render();
  });

  load();
  setInterval(render, 1000);
</script>
</body>
</html>
