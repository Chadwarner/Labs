<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #16213e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      width: 320px;
    }

    .display {
      background: #0f3460;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .display .expression {
      color: #a8b4c8;
      font-size: 14px;
      min-height: 20px;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display .value {
      color: #e0e0e0;
      font-size: 36px;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 18px 0;
      font-size: 18px;
      cursor: pointer;
      transition: transform 0.08s, opacity 0.08s;
      font-weight: 500;
    }

    button:active { transform: scale(0.93); opacity: 0.85; }

    .btn-num {
      background: #1a2a4a;
      color: #e0e0e0;
    }

    .btn-op {
      background: #0f4c8a;
      color: #63b3ed;
    }

    .btn-action {
      background: #1e3a5f;
      color: #90cdf4;
    }

    .btn-eq {
      background: #2b6cb0;
      color: #fff;
      font-size: 22px;
    }

    .btn-clear {
      background: #742a2a;
      color: #fc8181;
    }

    .span-2 { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="value" id="value">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clear_()">AC</button>
      <button class="btn-action" onclick="toggleSign()">+/-</button>
      <button class="btn-action" onclick="percent()">%</button>
      <button class="btn-op" onclick="op('/')">÷</button>

      <button class="btn-num" onclick="digit('7')">7</button>
      <button class="btn-num" onclick="digit('8')">8</button>
      <button class="btn-num" onclick="digit('9')">9</button>
      <button class="btn-op" onclick="op('*')">×</button>

      <button class="btn-num" onclick="digit('4')">4</button>
      <button class="btn-num" onclick="digit('5')">5</button>
      <button class="btn-num" onclick="digit('6')">6</button>
      <button class="btn-op" onclick="op('-')">−</button>

      <button class="btn-num" onclick="digit('1')">1</button>
      <button class="btn-num" onclick="digit('2')">2</button>
      <button class="btn-num" onclick="digit('3')">3</button>
      <button class="btn-op" onclick="op('+')">+</button>

      <button class="btn-num span-2" onclick="digit('0')">0</button>
      <button class="btn-num" onclick="decimal()">.</button>
      <button class="btn-eq" onclick="equals()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let stored = null;
    let operator = null;
    let justEvaled = false;
    let expression = '';

    const valEl = document.getElementById('value');
    const exprEl = document.getElementById('expression');

    function render() {
      valEl.textContent = current;
      exprEl.textContent = expression;
    }

    function digit(d) {
      if (justEvaled) { current = d; expression = ''; justEvaled = false; }
      else if (current === '0') current = d;
      else if (current.length < 12) current += d;
      render();
    }

    function decimal() {
      if (justEvaled) { current = '0.'; expression = ''; justEvaled = false; }
      else if (!current.includes('.')) current += '.';
      render();
    }

    function op(o) {
      justEvaled = false;
      if (operator && stored !== null) {
        current = String(compute(parseFloat(stored), parseFloat(current), operator));
      }
      stored = current;
      operator = o;
      expression = current + ' ' + { '+': '+', '-': '−', '*': '×', '/': '÷' }[o];
      current = '0';
      render();
    }

    function equals() {
      if (operator === null || stored === null) return;
      const result = compute(parseFloat(stored), parseFloat(current), operator);
      expression = stored + ' ' + { '+': '+', '-': '−', '*': '×', '/': '÷' }[operator] + ' ' + current + ' =';
      current = String(result);
      stored = null;
      operator = null;
      justEvaled = true;
      render();
    }

    function compute(a, b, op) {
      let r;
      if (op === '+') r = a + b;
      else if (op === '-') r = a - b;
      else if (op === '*') r = a * b;
      else if (op === '/') r = b === 0 ? NaN : a / b;
      if (isNaN(r)) return 'Error';
      // Trim floating point noise
      return parseFloat(r.toPrecision(10));
    }

    function clear_() {
      current = '0'; stored = null; operator = null;
      justEvaled = false; expression = '';
      render();
    }

    function toggleSign() {
      if (current !== '0' && current !== 'Error')
        current = String(parseFloat(current) * -1);
      render();
    }

    function percent() {
      if (current !== 'Error')
        current = String(parseFloat(current) / 100);
      render();
    }

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') digit(e.key);
      else if (e.key === '.') decimal();
      else if (e.key === '+') op('+');
      else if (e.key === '-') op('-');
      else if (e.key === '*') op('*');
      else if (e.key === '/') { e.preventDefault(); op('/'); }
      else if (e.key === 'Enter' || e.key === '=') equals();
      else if (e.key === 'Escape') clear_();
      else if (e.key === 'Backspace') {
        if (current.length > 1) current = current.slice(0, -1);
        else current = '0';
        render();
      }
    });
  </script>
</body>
</html>
